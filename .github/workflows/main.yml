name: Manual Reel Factory
on:
  workflow_dispatch: # زرار التشغيل المانيوال

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools & Deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install edge-tts

      - name: Create Assets Folders
        run: mkdir -p assets audio

      - name: Run Magic Script
        run: python pro_reels.py

      - name: Upload Finished Reel
        uses: actions/upload-artifact@v4
        with:
          name: Final-Instagram-Reel
          path: final_reel.mp4
